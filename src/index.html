<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Hello OpenCV.js</title>
</head>
<body>
<h2>Hello OpenCV.js</h2>
<p id="status">OpenCV.js is loading...</p>
<div>
  <div class="inputoutput">
    <canvas id="cameraCanvas" width="512" height="512"></canvas>
    <div class="caption">cameraCanvas</div>
  </div>
</div>
</div>
<script async src="./opencv.js" type="text/javascript"></script>
<script  type="text/javascript">
   
   var cv;

    function fetchImage() {
        fetch('./lena.png')
            .then(response => response.blob())
            .then(async(blob) => {
                cv = await window.cv;
                const img = new Image();
                img.src = URL.createObjectURL(blob);
                img.onload = () => {
                const src = cv.imread(img);

                // 1) Yeniden boyutlandır
                const dst0 = new cv.Mat();
                let dsize = new cv.Size(512, 512);
                cv.resize(src, dst0, dsize, 0, 0, cv.INTER_AREA);

                // 2) Gri tona çevir
                const gray = new cv.Mat();
                cv.cvtColor(dst0, gray, cv.COLOR_RGBA2GRAY, 0);

                // 3) Kernel oluştur (ones equivalent)
                let kernel = cv.Mat.ones(5, 5, cv.CV_32F);
                let scalar = new cv.Scalar(1.0 / 25.0);
                cv.multiply(kernel, scalar, kernel); // normalize

                // 4) Filter2D uygula
                const filtered = new cv.Mat();
                let anchor = new cv.Point(-1, -1);
                cv.filter2D(gray, filtered, -1, kernel, anchor, 0, cv.BORDER_DEFAULT);

                // 5) Canvas'a göster
                cv.imshow('cameraCanvas', filtered);

                // 6) Belleği temizle
                src.delete();
                dst0.delete();
                gray.delete();
                kernel.delete();
                filtered.delete();
            };
                img.onerror = () => {
                    console.error("Failed to load image");
                };
            
            })
            .catch(error => console.error('Error fetching image:', error));
    }

var Module = {

  onRuntimeInitialized() {
    document.getElementById('status').innerHTML = 'OpenCV.js is ready.';    
    setInterval(fetchImage, 1000);
  }
};

</script>

</body>
</html>
